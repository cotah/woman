<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="SafeCircle - Personal Safety">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="SafeCircle">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>SafeCircle</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body { margin: 0; background: #1A1A2E; }
    #loading {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; background: #1A1A2E; z-index: 999;
    }
    #loading h1 { color: #6C47FF; font-family: Arial, sans-serif; font-size: 28px; margin-bottom: 20px; }
    #loading .spinner {
      width: 40px; height: 40px; border: 4px solid #333;
      border-top-color: #6C47FF; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    #loading p { color: #6B7280; font-family: Arial, sans-serif; font-size: 14px; margin-top: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <h1>SafeCircle</h1>
    <div class="spinner"></div>
    <p>Loading...</p>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Hide loading screen when Flutter is ready
    window.addEventListener('flutter-first-frame', function() {
      var el = document.getElementById('loading');
      if (el) el.remove();
    });
    // Fallback: hide after 30 seconds regardless
    setTimeout(function() {
      var el = document.getElementById('loading');
      if (el) el.style.display = 'none';
    }, 30000);
  </script>
</body>
</html>
