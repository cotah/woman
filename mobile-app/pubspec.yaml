name: safecircle
description: SafeCircle - Personal Safety Platform
publish_to: 'none'
version: 1.0.0+7

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Networking
  http: ^1.2.1
  dio: ^5.4.3+1
  socket_io_client: ^2.0.3+1

  # State management
  provider: ^6.1.2

  # Routing
  go_router: ^14.0.2

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # Location & Maps
  geolocator: ^12.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Audio recording & speech recognition
  record: ^5.2.0
  speech_to_text: ^7.0.0
  audio_session: ^0.1.21

  # Authentication & Security
  local_auth: ^2.2.0
  permission_handler: ^11.3.1

  # Notifications
  flutter_local_notifications: ^17.2.1+2

  # SMS fallback
  url_launcher: ^6.2.0

  # International phone input with country flags
  intl_phone_field: ^3.2.0

  # Utilities
  uuid: ^4.4.0
  intl: any
  crypto: ^3.0.3

  # Error monitoring & crash reporting
  sentry_flutter: ^8.12.0

dependency_overrides:
  record_linux: any
  record_windows: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
