          KEYEOF
          sed -i 's/^          //' /tmp/cert_key.pem
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key="$(cat /tmp/cert_key.pem)"

      - name: Use profiles
        script: xcode-project use-profiles

      - name: Build iOS
        script: |
          flutter build ipa \
            --release \
            --dart-define=ENVIRONMENT=production \
            --dart-define=MAPBOX_TOKEN=$MAPBOX_TOKEN \
            --export-options-plist=/Users/builder/export_options.plist

      - name: Find IPA location
        script: |
          echo "=== Searching for .ipa files ==="
          find /Users/builder/clone -name "*.ipa" -type f 2>/dev/null
          echo "=== Build directory contents ==="
          ls -la build/ios/ipa/ 2>/dev/null || echo "build/ios/ipa/ not found"
          echo "=== PWD ==="
          pwd

    artifacts:
      - build/ios/ipa/*.ipa
      - build/**/*.ipa
      - /Users/builder/clone/mobile-app/build/ios/ipa/*.ipa
      - /Users/builder/clone/mobile-app/build/**/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
