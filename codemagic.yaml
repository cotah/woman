workflows:
  ios-release:
    name: iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    working_directory: mobile-app

    integrations:
      app_store_connect: SafeCircle

    environment:
      flutter: 3.27.4
      xcode: latest
      vars:
        MAPBOX_TOKEN: ${MAPBOX_TOKEN}
        BUNDLE_ID: "com.safecircle.safecircle"
        CERT_KEY: ""

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Install CocoaPods
        script: cd ios && pod install

      - name: Set up keychain
        script: keychain initialize

      - name: Fetch signing files
        script: |
          echo "$CERT_KEY" | base64 --decode > /tmp/cert_key.pem
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --certificate-key="$(cat /tmp/cert_key.pem)"

      - name: Install certificates in keychain
        script: keychain add-certificates

      - name: Use profiles
        script: xcode-project use-profiles

      - name: Build iOS
        script: |
          flutter build ipa \
            --release \
            --dart-define=ENVIRONMENT=staging \
            --dart-define=MAPBOX_TOKEN=$MAPBOX_TOKEN \
            --export-options-plist=/Users/builder/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - build/**/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
